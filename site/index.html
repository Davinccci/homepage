<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Davinci 的工具箱</title>
  <meta name="description" content="Davinci 的工具箱，收纳网页、工具和实验项目。" />
  <style>
    :root {
      --bg: #f7f7f5;
      --bg-soft: #efefeb;
      --paper: rgba(255, 255, 255, 0.84);
      --paper-strong: rgba(255, 255, 255, 0.94);
      --ink: #0f0f10;
      --ink-soft: #505054;
      --line: rgba(15, 15, 16, 0.1);
      --line-strong: rgba(15, 15, 16, 0.2);
      --shadow: 0 24px 80px rgba(15, 15, 16, 0.08);
      --max: 1240px;
      --radius-xl: 40px;
      --radius-lg: 28px;
      --radius-md: 22px;
      --sans: "Avenir Next", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --serif: "Iowan Old Style", "Palatino Linotype", "Songti SC", "STSong", serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: var(--sans);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 28%),
        linear-gradient(180deg, #fcfcfb 0%, var(--bg) 45%, var(--bg-soft) 100%);
      overflow-x: hidden;
      transition: background 500ms ease;
    }

    body[data-theme="2"] {
      background:
        radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.95), transparent 22%),
        linear-gradient(180deg, #fcfcfb 0%, #f5f5f2 52%, #ecece7 100%);
    }

    body[data-theme="3"] {
      background:
        radial-gradient(circle at 18% 82%, rgba(255, 255, 255, 0.92), transparent 22%),
        linear-gradient(180deg, #fbfbfa 0%, #f2f2ef 50%, #e9e9e4 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: 18px 0 72px;
    }

    .hero,
    .projects-list,
    .projects-display,
    .project-copy,
    .project-visual {
      border: 1px solid var(--line);
      background: var(--paper);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      min-height: 88vh;
      padding: 32px;
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.84), transparent 46%),
        repeating-linear-gradient(
          90deg,
          transparent 0,
          transparent 48px,
          rgba(15, 15, 16, 0.025) 48px,
          rgba(15, 15, 16, 0.025) 49px
        );
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 38vw;
      min-width: 280px;
      aspect-ratio: 1;
      right: -10vw;
      top: -8vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 15, 16, 0.08), rgba(15, 15, 16, 0.02) 54%, transparent 72%);
      filter: blur(8px);
      pointer-events: none;
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      min-height: calc(88vh - 64px);
      display: grid;
      place-items: center;
      text-align: center;
    }

    .hero-copy {
      width: min(100%, 760px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 24px 12px;
    }

    .hero-label,
    .projects-title,
    .project-kicker {
      font-size: 12px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .hero-label {
      margin: 0;
    }

    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(44px, 7vw, 88px);
      line-height: 1;
      letter-spacing: -0.05em;
      font-weight: 600;
      max-width: 8ch;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 0;
      justify-content: center;
    }

    .hero-link,
    .project-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      transition: transform 220ms ease, background 220ms ease, border-color 220ms ease, color 220ms ease;
    }

    .hero-link {
      min-width: 164px;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 600;
      background: var(--paper-strong);
    }

    .hero-link.primary {
      background: var(--ink);
      color: #ffffff;
      border-color: var(--ink);
    }

    .hero-link:hover,
    .project-chip:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
    }

    .project-copy p,
    footer {
      margin: 0;
      color: var(--ink-soft);
      line-height: 1.85;
      font-size: 15px;
    }

    .hero-link-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hero-ornament {
      width: min(100%, 520px);
      height: 76px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      position: relative;
      opacity: 0.9;
    }

    .hero-ornament::before,
    .hero-ornament::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      margin-top: -7px;
      border-radius: 50%;
      background: #111111;
    }

    .hero-ornament::before {
      left: 0;
    }

    .hero-ornament::after {
      right: 0;
    }

    .hero-ornament span {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 12px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }

    .projects {
      margin-top: 28px;
      min-height: 300vh;
    }

    .projects-stage {
      position: sticky;
      top: 18px;
      min-height: calc(100vh - 36px);
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    .projects-list,
    .projects-display {
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .projects-list {
      padding: 22px;
      display: grid;
      gap: 12px;
      align-content: start;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(246, 246, 243, 0.82));
    }

    .projects-title {
      padding: 8px 6px 14px;
      font-weight: 700;
    }

    .project-nav {
      position: relative;
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.54);
      opacity: 0.45;
      transform: translateX(0) scale(0.97);
      transition: transform 420ms cubic-bezier(.2,.8,.2,1), opacity 420ms ease, background 420ms ease, border-color 420ms ease;
    }

    .project-nav.active {
      opacity: 1;
      transform: translateX(8px) scale(1);
      background: rgba(255, 255, 255, 0.96);
      border-color: var(--line-strong);
    }

    .project-index {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #111111;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    .project-nav strong {
      display: block;
      margin-bottom: 4px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .project-nav span {
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.7;
    }

    .projects-display {
      position: relative;
      padding: 24px;
      min-height: calc(100vh - 120px);
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.9), transparent 24%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(243, 243, 240, 0.8));
    }

    .project-panel {
      position: absolute;
      inset: 24px;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: minmax(320px, 1fr) auto;
      gap: 18px;
      opacity: 0;
      transform: translateY(30px) scale(0.985);
      filter: blur(2px);
      pointer-events: none;
      transition: opacity 680ms ease, transform 820ms cubic-bezier(.22,.61,.36,1), filter 820ms ease;
    }

    .project-panel.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
      pointer-events: auto;
    }

    .project-copy,
    .project-visual {
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .project-copy {
      order: 2;
      padding: 18px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 244, 240, 0.86));
    }

    .project-copy-main {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: end;
    }

    .project-kicker {
      margin-bottom: 6px;
      font-weight: 700;
    }

    .project-copy h2 {
      margin: 0 0 6px;
      font-family: var(--serif);
      font-size: clamp(22px, 2vw, 28px);
      font-weight: 600;
      line-height: 1.06;
      letter-spacing: -0.04em;
      max-width: 100%;
    }

    .project-copy p {
      margin: 0;
      font-size: 12px;
      line-height: 1.5;
      max-width: 30rem;
      color: #5a5a5f;
    }

    .project-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 0;
      justify-content: flex-end;
      align-self: center;
    }

    .project-chip {
      padding: 7px 10px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.88);
    }

    .project-link-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .project-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 100px;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      font-size: 11px;
      font-weight: 600;
      transition: transform 220ms ease, border-color 220ms ease, background 220ms ease;
    }

    .project-link.primary {
      background: var(--ink);
      color: #ffffff;
      border-color: var(--ink);
    }

    .project-link:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
    }

    .project-visual {
      order: 1;
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 14px;
      background:
        linear-gradient(145deg, rgba(252, 252, 251, 0.98), rgba(236, 236, 232, 0.9));
      isolation: isolate;
    }

    .project-visual::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.32), transparent 28%, rgba(15, 15, 16, 0.03) 100%),
        repeating-linear-gradient(
          0deg,
          transparent 0,
          transparent 31px,
          rgba(15, 15, 16, 0.035) 31px,
          rgba(15, 15, 16, 0.035) 32px
        );
      pointer-events: none;
    }

    .project-preview-frame {
      width: min(100%, 920px);
      aspect-ratio: 16 / 9;
      display: grid;
      place-items: center;
      padding: 22px;
      border-radius: 30px;
      border: 1px solid rgba(15, 15, 16, 0.06);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.85), transparent 26%),
        linear-gradient(145deg, rgba(242,242,238,0.98), rgba(231,231,226,0.9));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.8),
        0 28px 60px rgba(15, 15, 16, 0.1);
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    .project-preview {
      width: calc(100% - 48px);
      height: calc(100% - 48px);
      position: relative;
      z-index: 1;
      border-radius: 20px;
      border: 1px solid rgba(15, 15, 16, 0.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,250,248,0.98));
      background-repeat: no-repeat;
      background-position: center center;
      background-size: contain;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.88),
        0 18px 36px rgba(15, 15, 16, 0.08);
    }

    .project-preview-frame.ratio-wide {
      aspect-ratio: 16 / 9;
    }

    .project-preview-frame.ratio-standard {
      aspect-ratio: 4 / 3;
    }

    .project-preview-frame.ratio-tall {
      aspect-ratio: 4 / 5;
      width: min(100%, 760px);
    }

    .project-empty {
      width: min(100%, 760px);
      aspect-ratio: 16 / 9;
      display: grid;
      place-items: center;
      border-radius: 28px;
      border: 1px dashed rgba(15, 15, 16, 0.14);
      color: var(--ink-soft);
      background: rgba(255, 255, 255, 0.52);
      position: relative;
      z-index: 1;
    }

    .project-empty span {
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .visual-frame,
    .visual-column,
    .visual-card,
    .visual-line,
    .visual-dot,
    .visual-badge {
      position: absolute;
      pointer-events: none;
    }

    .visual-frame {
      inset: 11%;
      border-radius: 30px;
      border: 1px solid rgba(15, 15, 16, 0.1);
      background: rgba(255, 255, 255, 0.56);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .visual-column {
      top: 18%;
      bottom: 18%;
      width: 18%;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(15, 15, 16, 0.96), rgba(50, 50, 52, 0.8));
      box-shadow: 0 24px 40px rgba(15, 15, 16, 0.18);
    }

    .visual-column.left {
      left: 14%;
    }

    .visual-column.right {
      right: 14%;
      background: linear-gradient(180deg, rgba(205, 205, 200, 0.84), rgba(110, 110, 116, 0.58));
    }

    .visual-card {
      left: 26%;
      right: 26%;
      top: 22%;
      bottom: 22%;
      border-radius: 28px;
      border: 1px solid rgba(15, 15, 16, 0.12);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(243, 243, 239, 0.88));
      transform: rotate(-6deg);
      box-shadow: 0 26px 60px rgba(15, 15, 16, 0.12);
    }

    .visual-line {
      height: 1px;
      left: 16%;
      right: 16%;
      background: rgba(15, 15, 16, 0.12);
    }

    .visual-line.one {
      top: 34%;
    }

    .visual-line.two {
      top: 50%;
    }

    .visual-line.three {
      top: 66%;
    }

    .visual-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #111111;
      top: 14%;
      right: 16%;
      box-shadow: 0 0 0 12px rgba(17, 17, 17, 0.08);
    }

    .visual-badge {
      left: 12%;
      bottom: 12%;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(15, 15, 16, 0.1);
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink-soft);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .panel-two .visual-card {
      transform: rotate(7deg);
      left: 22%;
      right: 30%;
    }

    .panel-two .visual-column.left {
      background: linear-gradient(180deg, rgba(220, 220, 216, 0.94), rgba(80, 80, 84, 0.5));
    }

    .panel-two .visual-column.right {
      background: linear-gradient(180deg, rgba(15, 15, 16, 0.96), rgba(64, 64, 66, 0.8));
    }

    .panel-two .visual-dot {
      right: auto;
      left: 18%;
      top: auto;
      bottom: 18%;
    }

    .panel-three .visual-card {
      left: 24%;
      right: 24%;
      top: 18%;
      bottom: 26%;
      transform: rotate(-3deg);
    }

    .panel-three .visual-column.left,
    .panel-three .visual-column.right {
      top: 20%;
      bottom: 26%;
      width: 16%;
    }

    .panel-three .visual-badge {
      left: auto;
      right: 14%;
      bottom: 14%;
    }

    .project-step {
      height: 100vh;
      opacity: 0;
      pointer-events: none;
    }

    footer {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 30px 8px 0;
      font-size: 14px;
    }

    @media (max-width: 1080px) {
      .project-panel,
      .projects-stage {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: auto;
      }

      .hero-grid {
        min-height: auto;
      }

      .projects {
        min-height: auto;
      }

      .projects-stage {
        position: relative;
        top: 0;
        min-height: auto;
      }

      .projects-display {
        min-height: 860px;
      }

      .project-panel {
        inset: 20px;
      }

      .project-step {
        display: none;
      }

      .project-copy-main {
        grid-template-columns: 1fr;
      }

      .project-meta {
        justify-content: flex-start;
      }
    }

    @media (max-width: 720px) {
      .page {
        width: min(calc(100% - 18px), var(--max));
        padding-top: 10px;
      }

      .hero,
      .projects-list,
      .projects-display {
        border-radius: 28px;
      }

      .hero {
        padding: 20px;
      }

      h1 {
        max-width: none;
        font-size: clamp(40px, 16vw, 62px);
      }

      .hero-copy {
        gap: 22px;
      }

      .project-copy,
      .project-visual {
        border-radius: 24px;
      }

      .projects-display {
        min-height: 700px;
        padding: 16px;
      }

      .project-panel {
        inset: 16px;
      }

      .project-visual {
        min-height: 200px;
        padding: 12px;
      }

      .project-copy {
        padding: 18px;
      }

      .project-preview-frame {
        padding: 16px;
        border-radius: 24px;
      }

      .project-nav.active {
        transform: translateX(0) scale(1);
      }

      footer {
        display: grid;
      }

      footer div + div {
        margin-top: 6px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      body,
      .hero-link,
      .project-chip,
      .project-nav,
      .project-panel {
        transition: none;
      }
    }
  </style>
</head>
<body data-theme="1">
  <div class="page">
    <main class="hero">
      <div class="hero-grid">
        <section class="hero-copy">
          <p class="hero-label">Personal Projects</p>
          <h1>Davinci的个人项目</h1>
          <div class="hero-link-row">
            <a class="hero-link primary" href="https://github.com/Davinccci" target="_blank" rel="noreferrer">GitHub</a>
            <a class="hero-link" href="#projects">查看项目</a>
          </div>
          <div class="hero-ornament" aria-hidden="true">
            <span>Archive / Toolkit / Lab</span>
          </div>
        </section>
      </div>
    </main>

    <section class="projects" id="projects">
      <div class="projects-stage">
        <div class="projects-list" id="projectsList">
          <div class="projects-title">我的项目</div>
        </div>

        <div class="projects-display" id="projectsDisplay"></div>
      </div>
      <div id="projectSteps"></div>
    </section>

    <footer>
      <div>oneclaw.com.cn</div>
      <div>Davinci 的工具箱</div>
    </footer>
  </div>

  <script>
    (function () {
      const body = document.body;
      const listEl = document.getElementById('projectsList');
      const displayEl = document.getElementById('projectsDisplay');
      const stepsEl = document.getElementById('projectSteps');

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, function (char) {
          return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
          }[char];
        });
      }

      function getRatioClass(project) {
        if (!project || !project.ratio) {
          return 'ratio-wide';
        }

        if (project.ratio === 'standard') {
          return 'ratio-standard';
        }

        if (project.ratio === 'tall') {
          return 'ratio-tall';
        }

        return 'ratio-wide';
      }

      function renderProjects(projects) {
        const items = projects.filter(function (project) {
          return project.status === 'online';
        });

        listEl.innerHTML = '<div class="projects-title">我的项目</div>';
        displayEl.innerHTML = '';
        stepsEl.innerHTML = '';

        items.forEach(function (project, index) {
          const id = String(index + 1);
          const isActive = index === 0;
          const ratioClass = getRatioClass(project);
          const nav = document.createElement('article');
          nav.className = 'project-nav' + (isActive ? ' active' : '');
          nav.dataset.project = id;
          nav.innerHTML =
            '<div class="project-index">' + String(index + 1).padStart(2, '0') + '</div>' +
            '<div><strong>' + escapeHtml(project.name) + '</strong><span>' +
            escapeHtml(project.subtitle || project.description || '') +
            '</span></div>';
          listEl.appendChild(nav);

          const panel = document.createElement('article');
          panel.className = 'project-panel' + (isActive ? ' active' : '');
          panel.dataset.project = id;
          panel.innerHTML =
            '<section class="project-copy">' +
              '<div class="project-copy-main">' +
                '<div>' +
                  '<div class="project-kicker">项目展示</div>' +
                  '<h2>' + escapeHtml(project.name) + '</h2>' +
                  '<p>' + escapeHtml(project.description || '') + '</p>' +
                  '<div class="project-link-bar">' +
                    '<a class="project-link primary" href="' + escapeHtml(project.url || '#') + '">打开项目</a>' +
                    (project.repo ? '<a class="project-link" href="' + escapeHtml(project.repo) + '" target="_blank" rel="noreferrer">查看仓库</a>' : '') +
                  '</div>' +
                '</div>' +
                '<div class="project-meta">' +
                  (Array.isArray(project.tags) ? project.tags.slice(0, 3).map(function (tag) {
                    return '<span class="project-chip">' + escapeHtml(tag) + '</span>';
                  }).join('') : '') +
                '</div>' +
              '</div>' +
            '</section>' +
            '<section class="project-visual">' +
              (project.cover
                ? '<div class="project-preview-frame ' + ratioClass + '"><div class="project-preview" role="img" aria-label="' + escapeHtml(project.name) + ' 项目预览" style="background-image:url(\'' + escapeHtml(project.cover) + '\')"></div></div>'
                : '<div class="project-empty"><span>No Preview</span></div>') +
            '</section>';
          displayEl.appendChild(panel);

          const step = document.createElement('div');
          step.className = 'project-step';
          step.dataset.project = id;
          stepsEl.appendChild(step);
        });

        const navs = Array.from(document.querySelectorAll('.project-nav'));
        const panels = Array.from(document.querySelectorAll('.project-panel'));
        const steps = Array.from(document.querySelectorAll('.project-step'));

        function activate(id) {
          navs.forEach(function (item) {
            item.classList.toggle('active', item.dataset.project === id);
          });
          panels.forEach(function (item) {
            item.classList.toggle('active', item.dataset.project === id);
          });
          body.setAttribute('data-theme', String(((Number(id) - 1) % 3) + 1));
        }

        navs.forEach(function (nav) {
          nav.addEventListener('click', function () {
            activate(nav.dataset.project);
          });
        });

        if (!steps.length) {
          return;
        }

        if (!('IntersectionObserver' in window) || window.innerWidth < 1081) {
          activate('1');
          return;
        }

        const observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              activate(entry.target.dataset.project);
            }
          });
        }, {
          threshold: 0.55
        });

        steps.forEach(function (step) {
          observer.observe(step);
        });
      }

      function renderEmptyState() {
        listEl.innerHTML = '<div class="projects-title">我的项目</div>';
        displayEl.innerHTML =
          '<article class="project-panel active" data-project="1">' +
            '<section class="project-copy">' +
              '<div class="project-copy-main">' +
                '<div>' +
                  '<div class="project-kicker">项目展示</div>' +
                  '<h2>暂无项目数据</h2>' +
                  '<p>请在 projects.json 中添加项目配置，并在 assets/projects/ 中放入封面图。</p>' +
                '</div>' +
              '</div>' +
            '</section>' +
            '<section class="project-visual">' +
              '<div class="project-empty"><span>Waiting For Projects</span></div>' +
            '</section>' +
          '</article>';
        stepsEl.innerHTML = '';
        body.setAttribute('data-theme', '1');
      }

      fetch('/projects.json')
        .then(function (response) {
          if (!response.ok) {
            throw new Error('Failed to load projects');
          }
          return response.json();
        })
        .then(renderProjects)
        .catch(function () {
          renderEmptyState();
        });
    }());
  </script>
</body>
</html>
